naftiko: 1.0.0-alpha2
info:
  label: Realtor.com Property Data API — Locations
  description: 'Realtor.com Property Data API — Locations. 1 operations. Lead operation: Auto-complete locations. Self-contained
    Naftiko capability covering one Realtor business surface.'
  tags:
  - Realtor
  - Locations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    REALTOR_API_KEY: REALTOR_API_KEY
capability:
  consumes:
  - type: http
    namespace: property-data-locations
    baseUri: https://realtor.p.rapidapi.com
    description: Realtor.com Property Data API — Locations business capability. Self-contained, no shared references.
    resources:
    - name: locations-v2-auto-complete
      path: /locations/v2/auto-complete
      operations:
      - name: autocompletelocations
        method: GET
        description: Auto-complete locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.REALTOR_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: property-data-locations-rest
    port: 8080
    description: REST adapter for Realtor.com Property Data API — Locations. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/locations/v2/auto-complete
      name: locations-v2-auto-complete
      description: REST surface for locations-v2-auto-complete.
      operations:
      - method: GET
        name: autocompletelocations
        description: Auto-complete locations
        call: property-data-locations.autocompletelocations
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: property-data-locations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Realtor.com Property Data API — Locations. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: auto-complete-locations
      description: Auto-complete locations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: property-data-locations.autocompletelocations
      outputParameters:
      - type: object
        mapping: $.
