specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: realtor
providerId: realtor
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Real Estate
  - Listings
  - MLS
description: Realtor.com does not publish a self-serve developer API price list. The realtor.com
  data and listing surfaces are made available through partner / RapidAPI-marketplace listings
  and through direct B2B agreements with the operator (Move, Inc., a News Corp subsidiary). Pricing
  on the marketplace varies per third-party publisher; native realtor.com partnership terms are
  contact-sales.
sources:
  - https://www.realtor.com/
notes: Direct fetch of realtor.com developer pages is blocked (anti-bot). Public pricing for a
  realtor-operated developer API was not located; treat as gated / contact-sales.
plans:
  - id: realtor-contact-sales
    name: Contact Sales
    type: enterprise
    description: Native realtor.com data partnership terms are negotiated with Move, Inc. directly.
      Third-party "realtor" listings on RapidAPI are priced by their respective publishers, not
      by realtor.com.
    entries:
      - label: Custom contract
        name: custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Direct partnership with Move, Inc.
maintainers:
