meters:
  - name: partnership_contract
    description: Annual data-partnership fee with Move, Inc.
    unit: contract
    aggregation: sum
principles:
  - name: Visibility
    description: Spend is invoiced at contract level; any usage telemetry is exchanged bilaterally
      under the partnership agreement.
  - name: Allocation
    description: Allocate against the consuming line-of-business cost center; per-call attribution
      is not exposed.
  - name: Optimization
    description: Renegotiate scope, geographic coverage, and refresh frequency at contract renewal.
  - name: Accountability
    description: The product team consuming listing data co-owns the contract with procurement.
