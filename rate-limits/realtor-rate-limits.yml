specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: realtor
providerId: realtor
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Real Estate
  - Listings
  - Rate Limiting
description: Realtor.com does not publish public rate limits for a native developer API. Marketplace
  listings (e.g. via RapidAPI) carry per-listing limits set by their publishers; native partnership
  rate limits are defined per contract.
sources:
  - https://www.realtor.com/
notes: Realtor.com developer pages are not publicly fetchable; no canonical rate-limit doc exists
  for reconciliation.
responseCodes: {}
limits:
  - name: Contract or marketplace defined
    scope: contract
    metric: varies
    limit: 'set per partnership contract or per RapidAPI listing'
policies:
  - name: Per-channel Configuration
    description: Limits are defined either per RapidAPI listing publisher or per direct partnership
      contract with Move, Inc.; there is no single platform-wide published number.
maintainers:
